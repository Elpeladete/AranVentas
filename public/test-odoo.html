<!DOCTYPE html>
<html>
<head>
    <title>Prueba de Conexión Odoo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-button { margin: 10px; padding: 10px; }
        .result { background: #f5f5f5; padding: 15px; margin: 10px 0; }
        .success { border-left: 4px solid #4CAF50; }
        .error { border-left: 4px solid #f44336; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🔧 Diagnóstico de Conexión Odoo</h1>
    
    <div>
        <button class="test-button" onclick="testConfig('default')">Probar Config. Original</button>
        <button class="test-button" onclick="testConfig('simple')">Probar Usuario Simple</button>
        <button class="test-button" onclick="testConfig('dbtest')">Probar DB Alternativa</button>
        <button class="test-button" onclick="clearResults()">Limpiar</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        async function testConfig(testType) {
            const resultDiv = document.getElementById('results');
            resultDiv.innerHTML = '<div class="result">🔄 Probando configuración: ' + testType + '</div>' + resultDiv.innerHTML;
            
            try {
                const response = await fetch('/api/odoo-test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ testType: testType })
                });
                
                const data = await response.json();
                
                const resultClass = data.success && data.analysis.includes('success') ? 'success' : 'error';
                const resultHTML = `
                    <div class="result ${resultClass}">
                        <h3>📊 Resultado para ${testType}:</h3>
                        <strong>Status:</strong> ${data.success ? '✅ OK' : '❌ ERROR'}<br>
                        <strong>Análisis:</strong> ${data.analysis || 'N/A'}<br>
                        <strong>Config:</strong> ${data.config.user}@${data.config.db}<br>
                        <strong>HTTP Status:</strong> ${data.responseStatus}<br>
                        ${data.error ? '<strong>Error:</strong> ' + data.error + '<br>' : ''}
                        <details>
                            <summary>Ver respuesta XML</summary>
                            <pre>${data.xmlResponse || 'No disponible'}</pre>
                        </details>
                        <small>Timestamp: ${data.timestamp}</small>
                    </div>
                `;
                
                resultDiv.innerHTML = resultHTML + resultDiv.innerHTML;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Error de Red:</h3>
                        <pre>${error.message}</pre>
                    </div>
                ` + resultDiv.innerHTML;
            }
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        // Auto-test al cargar
        window.onload = function() {
            testConfig('default');
        };
    </script>
</body>
</html>
